server.systemd-socket-activation = "enable"
include env.SRCDIR + "/tmp/bind*.conf"

server.document-root = env.SRCDIR + "/tmp/lighttpd/servers/ech-public/pages/"
server.errorlog = env.SRCDIR + "/tmp/lighttpd/logs/lighttpd-ssl-ech-extra.error.log"

server.modules = ( "mod_openssl" )

index-file.names = ( "index.txt" )

ssl.engine = "enable"
ssl.pemfile = env.SRCDIR + "/tmp/lighttpd/tls/server.crt"
ssl.privkey = env.SRCDIR + "/tmp/lighttpd/tls/server.key"

ssl.ech-opts = (
	"keydir" => env.ECH_KEYDIR,
	"refresh" => 300,
	"public-names" => ( "example.com" => "" ),
)

$HTTP["host"] == "hidden.example.com" {
	server.document-root = env.SRCDIR + "/tmp/lighttpd/servers/ech-hidden/pages/"
	ssl.ech-public-name = "example.com"
}
