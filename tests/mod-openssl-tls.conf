server.systemd-socket-activation = "enable"
include env.SRCDIR + "/tmp/bind*.conf"

server.document-root = env.SRCDIR + "/tmp/lighttpd/servers/www.example.org/pages/"
server.errorlog = env.SRCDIR + "/tmp/lighttpd/logs/lighttpd-ssl-ech.error.log"

server.modules = ( "mod_openssl" )

index-file.names = ( "index.html" )

ssl.engine = "enable"
ssl.pemfile = env.SRCDIR + "/tmp/lighttpd/tls/server.crt"
ssl.privkey = env.SRCDIR + "/tmp/lighttpd/tls/server.key"
